<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Pure Chess Play v7</title><style>body{margin:0;min-height:100svh;display:grid;place-items:center;background:#06100b;color:#f8efd9;font-family:system-ui,-apple-system,Segoe UI,sans-serif}.card{max-width:560px;margin:18px;border:1px solid rgba(255,255,255,.15);border-radius:22px;background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.03));padding:20px;box-shadow:0 20px 60px rgba(0,0,0,.38)}.badge{color:#e8b84a;font-weight:900}</style></head><body><div class="card"><h1>Pure Chess Play v7</h1><p class="badge">Loading Battle HUD build...</p><p>No CDN. No external files.</p></div><script>
fetch('play.html?v=5-core-'+Date.now()).then(r=>r.text()).then(html=>{
  const patch = String.raw`<script>
(function(){
  var audioCtx=null,musicOn=false,sfxOn=true,musicTimer=0,lastReport='';
  function q(id){return document.getElementById(id)}
  function boot(){
    document.title='Pure Chess Play v7';
    var badge=document.querySelector('.badge'); if(badge) badge.textContent='play v7 battle HUD';
    var sub=document.querySelector('.sub'); if(sub) sub.textContent='Play v7. Battle HUD, adaptive audio, stronger debug.';
    injectStyles(); injectHud(); wrapCore(); updateHud(); setInterval(updateHud,700);
  }
  function injectStyles(){
    var s=document.createElement('style'); s.textContent='\n.battleFab{position:fixed;right:calc(12px + env(safe-area-inset-right));bottom:calc(12px + env(safe-area-inset-bottom));z-index:80;border:1px solid rgba(232,184,74,.5);background:rgba(7,13,10,.94);color:#e8b84a;border-radius:999px;padding:12px 14px;font-weight:1000;box-shadow:0 18px 50px rgba(0,0,0,.45)}\n.battlePanel{position:fixed;z-index:90;right:calc(12px + env(safe-area-inset-right));bottom:calc(66px + env(safe-area-inset-bottom));width:min(420px,calc(100vw - 24px));max-height:min(70svh,620px);overflow:auto;border:1px solid rgba(255,255,255,.16);border-radius:22px;background:linear-gradient(180deg,rgba(17,27,21,.98),rgba(5,9,7,.98));box-shadow:0 28px 80px rgba(0,0,0,.55);display:none}.battlePanel.open{display:block}.battleHead{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:13px 15px;border-bottom:1px solid rgba(255,255,255,.14)}.battleHead b{color:#e8b84a}.battleBody{padding:12px 15px;display:grid;gap:10px}.battleGrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.battleBox{background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:10px;color:#b8c5bb;white-space:pre-wrap;font:12px ui-monospace,Menlo,Consolas,monospace}.gameBanner{position:fixed;left:50%;top:calc(74px + env(safe-area-inset-top));transform:translateX(-50%);z-index:70;width:min(92vw,540px);border:1px solid rgba(232,184,74,.38);border-radius:18px;background:rgba(7,13,10,.9);backdrop-filter:blur(12px);padding:10px 14px;text-align:center;box-shadow:0 18px 50px rgba(0,0,0,.36);display:none}.gameBanner.show{display:block}.gameBanner strong{color:#e8b84a}.miniMeter{height:8px;border-radius:999px;background:rgba(255,255,255,.12);overflow:hidden}.miniFill{height:100%;width:20%;background:linear-gradient(90deg,#7ac58b,#e8b84a,#c85e54);border-radius:999px;transition:.25s}\n@media(max-width:700px){.battleFab{right:12px;bottom:12px}.battlePanel{right:12px;bottom:62px}}'; document.head.appendChild(s);
  }
  function injectHud(){
    if(q('battleFab'))return;
    document.body.insertAdjacentHTML('beforeend','<div class="gameBanner" id="gameBanner"><strong>Battle State</strong><div id="gameBannerText">Active</div></div><button class="battleFab" id="battleFab">⚙ Debug</button><section class="battlePanel" id="battlePanel"><div class="battleHead"><b>Battle Command</b><button id="battleClose">Close</button></div><div class="battleBody"><div class="battleGrid"><button id="musicBtn">Start Music</button><button id="sfxBtn">SFX On</button><button id="debugNowBtn">Run Full Debug</button><button id="copyNowBtn">Copy Report</button></div><label>Track</label><select id="track"><option value="war">War March</option><option value="forest">Ancient Forest</option><option value="dungeon">Dungeon Ruins</option><option value="kingdom">Heroic Kingdom</option></select><label>Adaptive Intensity</label><div class="miniMeter"><div class="miniFill" id="intensityFill"></div></div><div class="battleBox" id="battleState">State loading...</div><div class="battleBox" id="battleDebug">Debug not run.</div></div></section>');
    q('battleFab').onclick=function(){q('battlePanel').classList.toggle('open'); updateHud();}; q('battleClose').onclick=function(){q('battlePanel').classList.remove('open')}; q('musicBtn').onclick=toggleMusic; q('sfxBtn').onclick=function(){sfxOn=!sfxOn; q('sfxBtn').textContent=sfxOn?'SFX On':'SFX Off'; toast('SFX '+(sfxOn?'on':'off')+'.')}; q('debugNowBtn').onclick=debug; q('copyNowBtn').onclick=copyReport;
    var side=document.querySelector('.side'); if(side && !q('quickAudio')){var sec=document.createElement('div'); sec.className='sec grid'; sec.innerHTML='<button id="quickAudio">Start Music</button><button id="quickDebug">Battle Debug</button>'; var moves=q('moves'); moves&&moves.closest('.sec').before(sec); q('quickAudio').onclick=toggleMusic; q('quickDebug').onclick=function(){q('battlePanel').classList.add('open');debug()};}
  }
  function wrapCore(){
    if(window.v7Wrapped)return; window.v7Wrapped=true;
    var oldMove=window.move; if(oldMove){ window.move=function(x1,y1,x2,y2){var cap=window.b&&window.b[y2]&&window.b[y2][x2]; oldMove(x1,y1,x2,y2); sfx(cap?'capture':'move'); updateHud(); if(window.over) victoryPulse();}; }
    var oldReset=window.reset; if(oldReset){ window.reset=function(){oldReset(); updateHud();}; }
    var oldRenderSide=window.renderSide; if(oldRenderSide){ window.renderSide=function(){oldRenderSide(); updateHud();}; }
    window.debug=debug; window.copyDebug=copyReport;
  }
  function initAudio(){ if(!audioCtx)audioCtx=new (window.AudioContext||window.webkitAudioContext)(); if(audioCtx.state==='suspended')audioCtx.resume(); }
  function tone(freq,dur,type,gain,delay){ if(!audioCtx)return; var now=audioCtx.currentTime+(delay||0),o=audioCtx.createOscillator(),g=audioCtx.createGain(); o.type=type||'sine'; o.frequency.setValueAtTime(freq,now); g.gain.setValueAtTime(0.0001,now); g.gain.exponentialRampToValueAtTime(gain||0.04,now+.02); g.gain.exponentialRampToValueAtTime(0.0001,now+dur); o.connect(g); g.connect(audioCtx.destination); o.start(now); o.stop(now+dur+.05); }
  function intensity(){ var pieces=0;if(window.b)for(var y=0;y<8;y++)for(var x=0;x<8;x++)if(b[y][x])pieces++; var moves=window.hist?hist.length:0; var legal=window.allMoves&&window.t?allMoves(t).length:20; var base=Math.min(5,Math.floor(moves/8)+1); var end=pieces<=12?2:pieces<=18?1:0; var pinch=legal<=5?1:0; var lost=legal===0?1:0; return Math.max(1,Math.min(5,base+end+pinch+lost)); }
  function gameState(){ var legal=window.allMoves&&window.t?allMoves(t).length:0; if(window.over||legal===0)return 'ENDED / NO LEGAL MOVES'; if(legal<=3)return 'DANGER'; if(legal<=8)return 'PRESSURE'; return 'ACTIVE'; }
  function updateHud(){ var i=intensity(),legal=window.allMoves&&window.t?allMoves(t).length:'n/a',pieces=0;if(window.b)for(var y=0;y<8;y++)for(var x=0;x<8;x++)if(b[y][x])pieces++; var gs=gameState(); if(q('intensityFill'))q('intensityFill').style.width=(i*20)+'%'; if(q('battleState'))q('battleState').textContent=['State: '+gs,'Turn: '+(window.t==='w'?'White':'Black'),'Legal moves: '+legal,'Pieces left: '+pieces,'Move count: '+(window.hist?hist.length:0),'Music: '+(musicOn?'on':'off'),'SFX: '+(sfxOn?'on':'off'),'Intensity: '+i+'/5'].join('\n'); var banner=q('gameBanner'); if(banner){ if(gs==='ENDED / NO LEGAL MOVES'||gs==='DANGER'){banner.classList.add('show');q('gameBannerText').textContent=gs==='ENDED / NO LEGAL MOVES'?'No legal moves detected. This position needs final checkmate/stalemate classification.':'Danger: legal moves are almost gone.';} else banner.classList.remove('show');} }
  function musicTick(){ if(!musicOn||!audioCtx)return; var i=intensity(),track=q('track')?q('track').value:'war',root={war:55,forest:73,dungeon:49,kingdom:65}[track]||55; tone(root,.34,'sine',.035); if(i>=2)tone(root*2,.16,'triangle',.025,.13); if(i>=3)tone(root*.5,.18,'sawtooth',.05,.06); if(i>=4)tone(root*1.5,.18,'triangle',.035,.28); if(i>=5){tone(root*.75,.24,'sawtooth',.06,.12);tone(root*2.25,.2,'square',.028,.34)} clearTimeout(musicTimer); musicTimer=setTimeout(musicTick,Math.max(340,900-i*95)); }
  function toggleMusic(){ initAudio(); musicOn=!musicOn; ['musicBtn','quickAudio'].forEach(function(id){if(q(id))q(id).textContent=musicOn?'Stop Music':'Start Music'}); toast(musicOn?'Adaptive music started.':'Music stopped.'); if(musicOn)musicTick(); updateHud(); }
  function sfx(kind){ if(!sfxOn)return; initAudio(); if(kind==='move'){tone(180,.08,'triangle',.025);tone(95,.07,'sine',.018,.04)} if(kind==='capture'){tone(80,.22,'sawtooth',.06);tone(46,.28,'sine',.08,.02)} }
  function victoryPulse(){ initAudio(); tone(55,.65,'sawtooth',.09); tone(110,.55,'triangle',.06,.1); tone(220,.35,'sine',.04,.25); }
  function debug(){ updateHud(); var legal=window.allMoves&&window.t?allMoves(t).length:'n/a'; var white=window.allMoves?allMoves('w').length:'n/a',black=window.allMoves?allMoves('b').length:'n/a'; lastReport=['PURE CHESS DEBUG REPORT','Version: play v7 battle HUD','No CDN. No external files.','Game state: '+gameState(),'Current turn: '+(window.t==='w'?'White':'Black'),'Current legal moves: '+legal,'White moves: '+white,'Black moves: '+black,'Adaptive music: '+(musicOn?'on':'off'),'SFX: '+(sfxOn?'on':'off'),'Intensity: '+intensity()+'/5','URL: '+location.href,'Squares: '+document.querySelectorAll('.sq').length,'Theme: '+(q('theme')?q('theme').value:'n/a'),'Pieces: '+(q('pieceStyle')?q('pieceStyle').value:'n/a'),'Mode: '+(q('mode')?q('mode').value:'n/a'),'Bot: '+(q('botLevel')?q('botLevel').value:'n/a')].join('\n'); if(q('battleDebug'))q('battleDebug').textContent=lastReport; if(q('debug'))q('debug').textContent=lastReport; if(q('debugPill'))q('debugPill').textContent='Ran'; toast('Battle debug ran.'); return lastReport; }
  function copyReport(){ if(!lastReport)debug(); if(navigator.clipboard)navigator.clipboard.writeText(lastReport).then(function(){toast('Debug copied.')}).catch(function(){toast('Copy failed.')}); }
  function toast(msg){ var t=q('toast'); if(!t)return; t.textContent=msg; t.classList.add('show'); setTimeout(function(){t.classList.remove('show')},1500); }
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',boot); else boot();
})();
<\/script>`;
  html=html.replace(/Pure Chess Play v5/g,'Pure Chess Play v7').replace(/play v5/g,'play v7 battle HUD').replace(/<\/body>/i,patch+'</body>');
  document.open(); document.write(html); document.close();
}).catch(err=>{document.body.innerHTML='<div class="card"><h1>Play v7 failed to load</h1><p>'+String(err)+'</p><p>Use play.html?v=5 while I fix it.</p></div>'});
</script></body></html>
