<style>

<body>
<div class="loading" id="loading"><div class="card"><h1>Pure Chess v15.2</h1><p class="badge">Loading Soft 3D Lock...</p><p>Hardwood board preserved. Soft 3D pieces locked cleanly.</p></div></div>
<iframe id="game" src="play-v13.html?v=13-soft-lock"></iframe>
<script>
(function(){
var frame=document.getElementById('game'),loading=document.getElementById('loading'),report='';
function install(){
  var w=frame.contentWindow,d=frame.contentDocument;if(!w||!d||!d.getElementById('board'))return;
  loading.style.display='none';d.title='Pure Chess v15.2 Soft 3D Lock';
  var style=d.createElement('style');style.textContent='\n:root{--softWhiteBody:#e5eef1;--softWhiteTop:#fbffff;--softWhiteEdge:#91a8b3;--softBlackBody:#5a625f;--softBlackTop:#79807c;--softBlackEdge:#303634}\n[data-theme="darkoak"]{--bg:#050403;--light:#8a5f35;--dark:#3f2515;--gold:#d7a342}\n[data-theme="walnut"]{--bg:#070403;--light:#9b6b3f;--dark:#4a2b18;--gold:#e0ad52}\n.boardCard{background:linear-gradient(180deg,rgba(92,50,18,.44),rgba(21,11,5,.18)),linear-gradient(180deg,rgba(255,255,255,.1),rgba(255,255,255,.032))!important}.board{box-shadow:inset 0 0 0 1px rgba(255,255,255,.1),inset 0 0 42px rgba(0,0,0,.58),0 24px 68px rgba(0,0,0,.6)!important}.softPiece{z-index:5;width:96%;height:99%;overflow:visible;filter:drop-shadow(0 10px 7px rgba(0,0,0,.38));transition:transform .14s ease}.sq:hover .softPiece{transform:translateY(-2px) scale(1.035)}.softPiece.white{--body:var(--softWhiteBody);--top:var(--softWhiteTop);--edge:var(--softWhiteEdge);--deep:#b9cbd2;--mark:#7c919b;--shadow:rgba(49,67,78,.25)}.softPiece.black{--body:var(--softBlackBody);--top:var(--softBlackTop);--edge:var(--softBlackEdge);--deep:#343a38;--mark:#242827;--shadow:rgba(0,0,0,.42)}.softPiece .sh{fill:var(--shadow)}.softPiece .body{fill:var(--body);stroke:var(--edge);stroke-width:2.8;stroke-linecap:round;stroke-linejoin:round}.softPiece .top{fill:var(--top);opacity:.88}.softPiece .deep{fill:var(--deep);stroke:rgba(0,0,0,.18);stroke-width:1}.softPiece .mark{fill:var(--mark);font:900 15px Georgia,serif;text-anchor:middle;dominant-baseline:middle;opacity:.72}.softPiece.black .mark{fill:#252a28;opacity:.95}.softPiece .cut{fill:rgba(255,255,255,.46)}.softPiece.black .cut{fill:rgba(255,255,255,.16)}\n';d.head.appendChild(style);
  var badge=d.querySelector('.badge');if(badge)badge.textContent='v15.2 soft lock';
  var sub=d.querySelector('.sub');if(sub)sub.textContent='v15.2 Soft 3D Lock. Hardwood board + clean rounded 2026 pieces.';
  d.querySelectorAll('label').forEach(function(l){if(l.textContent.trim()==='Theme')l.textContent='Board Skin';if(l.textContent.trim()==='Pieces')l.textContent='Piece Pack'});
  var theme=d.getElementById('theme');if(theme){theme.innerHTML='<option value="rings">War Wood</option><option value="darkoak">Dark Oak</option><option value="walnut">Walnut</option><option value="classic">Classic Wood</option>';theme.value='rings';theme.onchange=function(){d.body.dataset.theme=theme.value;renderSoft()};}
  var pack=d.getElementById('pieceStyle');if(pack){pack.innerHTML='<option value="soft3d">Soft 3D</option><option value="forge">Forge 3D</option><option value="classic">Classic Symbols</option>';pack.value='soft3d';pack.onchange=function(){renderSoft()};}
  w.renderSoft=renderSoft;wireDebug();renderSoft();setInterval(function(){var p=d.getElementById('pieceStyle');if(p&&p.value!=='soft3d'&&p.dataset.userChanged!=='1')p.value='soft3d';renderSoft()},900);
}
function softSvg(piece){var c=piece[0],t=piece[1],cls=c==='w'?'white':'black',head='',body='',markY=70;
if(t==='P'){head='<circle class="body" cx="50" cy="34" r="15"/><circle class="top" cx="45" cy="28" r="6"/>';body='<path class="body" d="M35 55 C38 45 62 45 65 55 L71 87 C60 96 40 96 29 87 Z"/>';}
if(t==='R'){head='<path class="body" d="M30 22 Q30 16 36 16 H64 Q70 16 70 22 V35 Q70 42 63 42 H37 Q30 42 30 35 Z"/><rect class="top" x="38" y="12" width="24" height="10" rx="4"/>';body='<path class="body" d="M32 42 H68 L65 87 C56 96 44 96 35 87 Z"/>';}
if(t==='N'){head='<path class="body" d="M30 80 C34 58 30 43 43 28 C52 18 66 19 75 27 C68 30 70 40 78 45 C67 45 63 52 67 61 C57 59 51 64 49 81 C44 88 36 88 30 80 Z"/><circle class="mark" cx="58" cy="38" r="3"/>';body='<path class="cut" d="M42 31 C50 25 60 24 67 27 C55 28 48 34 42 42 Z"/>';}
if(t==='B'){head='<path class="body" d="M50 15 C67 30 70 49 58 63 C67 69 69 79 64 87 C56 95 44 95 36 87 C31 79 33 69 42 63 C30 49 33 30 50 15 Z"/><path class="cut" d="M51 28 C57 39 56 51 49 61 C43 51 44 39 51 28 Z"/>';}
if(t==='Q'){head='<path class="body" d="M22 43 L30 18 L42 38 L50 12 L58 38 L70 18 L78 43 Q67 50 50 50 Q33 50 22 43 Z"/><circle class="top" cx="30" cy="18" r="4"/><circle class="top" cx="50" cy="12" r="4"/><circle class="top" cx="70" cy="18" r="4"/>';body='<path class="body" d="M35 49 H65 L62 87 C54 96 46 96 38 87 Z"/>';}
if(t==='K'){head='<path class="body" d="M45 10 H55 V25 H70 Q74 25 74 30 Q74 35 70 35 H55 V49 H45 V35 H30 Q26 35 26 30 Q26 25 30 25 H45 Z"/>';body='<path class="body" d="M33 50 C36 37 64 37 67 50 L63 87 C55 96 45 96 37 87 Z"/>';markY=73;}
return '<svg class="softPiece '+cls+'" viewBox="0 0 100 120"><ellipse class="sh" cx="50" cy="108" rx="31" ry="8"/>'+head+body+'<path class="deep" d="M26 91 C35 84 65 84 74 91 L69 103 C58 109 42 109 31 103 Z"/><text class="mark" x="50" y="'+markY+'">'+t+'</text></svg>'}
function classic(piece){var U={wK:'♔',wQ:'♕',wR:'♖',wB:'♗',wN:'♘',wP:'♙',bK:'♚',bQ:'♛',bR:'♜',bB:'♝',bN:'♞',bP:'♟'};return '<span class="pclassic '+(piece[0]==='w'?'w':'bl')+'">'+U[piece]+'</span>'}
function renderSoft(){var w=frame.contentWindow,d=frame.contentDocument;if(!w||!d||!w.b)return;var board=d.getElementById('board'),pack=d.getElementById('pieceStyle')?d.getElementById('pieceStyle').value:'soft3d';if(!board)return;board.innerHTML='';var k=w.findKing(w.t,w.b),chk=k&&w.attacked(w.b,k.x,k.y,w.enemy(w.t));for(var dy=0;dy<8;dy++)for(var dx=0;dx<8;dx++){var x=w.flip?7-dx:dx,y=w.flip?7-dy:dy,p=w.b[y][x],sq=d.createElement('div'),m=(w.leg||[]).find(function(v){return v.to.x===x&&v.to.y===y});sq.className='sq '+(((x+y)%2)?'d':'l');if(w.sel&&w.sel.x===x&&w.sel.y===y)sq.classList.add('sel');if(m){sq.classList.add('hint');if(w.b[y][x]||m.ep)sq.classList.add('take')}if(w.last&&((w.last.from.x===x&&w.last.from.y===y)||(w.last.to.x===x&&w.last.to.y===y)))sq.classList.add('last');if(w.flashTo&&w.flashTo.x===x&&w.flashTo.y===y)sq.classList.add('flash');if(chk&&k&&k.x===x&&k.y===y)sq.classList.add('check');sq.onclick=(function(a,b){return function(){w.tap(a,b);setTimeout(renderSoft,25)}})(x,y);if(p){sq.innerHTML=pack==='classic'?classic(p):(pack==='soft3d'?softSvg(p):w.pieceSvg?w.pieceSvg(p):classic(p));}board.appendChild(sq)}}
function wireDebug(){var d=frame.contentDocument,w=frame.contentWindow;function pretty(v){return v==='w'?'White':v==='b'?'Black':v==='draw'?'Draw':String(v||'none')}function debug(){renderSoft();var theme=d.getElementById('theme'),pack=d.getElementById('pieceStyle');report=['PURE CHESS DEBUG REPORT','Version: play v15.2 soft 3D lock','Architecture: v13 stable core with v15.2 visual renderer','No CDN. No external files.','Rules: check/checkmate/stalemate/castling/en passant/promotion picker','Visual System: split','Board Skin: '+(theme?theme.selectedOptions[0].textContent:'n/a'),'Piece Pack: '+(pack?pack.selectedOptions[0].textContent:'n/a'),'Soft 3D pieces: locked default','Hardwood board: preserved','Winner labels: clean','Result: '+w.result,'Reason: '+w.reason,'Winner: '+pretty(w.winner),'Turn: '+pretty(w.t),'Current legal moves: '+w.allLegal(w.t).length,'White legal moves: '+w.allLegal('w').length,'Black legal moves: '+w.allLegal('b').length,'In check: '+w.isCheck(w.t),'URL: '+location.href,'Squares: '+d.querySelectorAll('.sq').length,'Mode: '+d.getElementById('mode').value,'Bot: '+d.getElementById('bot').value].join('\n');var out=d.getElementById('debugOut');if(out)out.textContent=report;var toast=d.getElementById('toast');if(toast){toast.textContent='v15.2 debug ran.';toast.classList.add('show');setTimeout(function(){toast.classList.remove('show')},1500)}return report}var db=d.getElementById('debugBtn'),cp=d.getElementById('copyBtn'),fab=d.getElementById('fab');if(db)db.onclick=debug;if(cp)cp.onclick=function(){if(!report)debug();navigator.clipboard&&navigator.clipboard.writeText(report)};if(fab)fab.onclick=function(){d.getElementById('cmd').classList.toggle('open');renderSoft()};w.v152Debug=debug;}
frame.addEventListener('load',function(){setTimeout(install,250);setTimeout(install,1000)});
})();
</script>
