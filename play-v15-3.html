  d.head.appendChild(style);
  var badge=d.querySelector('.badge');if(badge)badge.textContent='v15.3 soft sculpt';
  var sub=d.querySelector('.sub');if(sub)sub.textContent='v15.3 Soft Sculpt. Hardwood board + rounded premium no-letter pieces.';
  d.querySelectorAll('label').forEach(function(l){if(l.textContent.trim()==='Theme')l.textContent='Board Skin';if(l.textContent.trim()==='Pieces')l.textContent='Piece Pack'});
  var theme=d.getElementById('theme');if(theme){theme.innerHTML='<option value="rings">War Wood</option><option value="darkoak">Dark Oak</option><option value="walnut">Walnut</option><option value="classic">Classic Wood</option>';theme.value='rings';theme.onchange=function(){d.body.dataset.theme=theme.value;renderSculpt()};}
  var pack=d.getElementById('pieceStyle');if(pack){pack.innerHTML='<option value="softpro">Soft 3D Pro</option><option value="soft3d">Soft 3D Classic</option><option value="forge">Forge 3D</option><option value="classic">Classic Symbols</option>';pack.value='softpro';pack.onchange=function(){renderSculpt()};}

function svgPro(piece){var c=piece[0],t=piece[1],cls=c==='w'?'white':'black',head='',body='',detail='';
if(t==='P'){head='<circle class="main" cx="50" cy="33" r="15"/><ellipse class="top" cx="45" cy="27" rx="6" ry="4"/>';body='<path class="main" d="M36 55 C39 46 61 46 64 55 L70 86 C61 96 39 96 30 86 Z"/><path class="deep" d="M29 89 C39 84 61 84 71 89 L67 101 C57 108 43 108 33 101 Z"/>';}
if(t==='R'){head='<path class="main" d="M30 20 Q30 15 35 15 H41 V24 H47 V15 H53 V24 H59 V15 H65 Q70 15 70 20 V36 Q70 42 64 42 H36 Q30 42 30 36 Z"/><path class="top" d="M36 19 H64 Q66 19 66 22 V26 H34 V22 Q34 19 36 19 Z"/>';body='<path class="main" d="M34 43 H66 L63 86 C55 96 45 96 37 86 Z"/><path class="deep" d="M28 89 C38 84 62 84 72 89 L68 102 C58 108 42 108 32 102 Z"/>';}
if(t==='N'){head='<path class="main" d="M30 81 C34 60 31 44 43 29 C52 18 66 19 75 28 C68 31 70 40 78 45 C68 46 64 53 68 62 C58 60 52 64 49 81 C44 88 36 89 30 81 Z"/><circle class="small" cx="59" cy="37" r="3"/><path class="cut" d="M44 30 C52 25 61 25 68 28 C56 29 49 35 44 42 Z"/>';body='<path class="deep" d="M30 90 C39 85 61 85 70 90 L66 102 C57 108 43 108 34 102 Z"/>';}
if(t==='B'){head='<path class="main" d="M50 14 C67 29 70 49 58 63 C67 69 69 79 64 87 C56 96 44 96 36 87 C31 79 33 69 42 63 C30 49 33 29 50 14 Z"/><path class="cut" d="M51 28 C57 39 56 52 49 62 C43 52 44 39 51 28 Z"/>';body='<path class="deep" d="M28 90 C38 84 62 84 72 90 L68 102 C58 108 42 108 32 102 Z"/>';}
if(t==='Q'){head='<path class="main" d="M22 44 L30 18 L42 39 L50 13 L58 39 L70 18 L78 44 C68 51 32 51 22 44 Z"/><circle class="top" cx="30" cy="18" r="4"/><circle class="top" cx="50" cy="13" r="4"/><circle class="top" cx="70" cy="18" r="4"/>';body='<path class="main" d="M35 49 H65 L62 86 C55 96 45 96 38 86 Z"/><path class="deep" d="M27 90 C38 84 62 84 73 90 L68 103 C58 109 42 109 32 103 Z"/>';detail='<path class="groove" d="M38 59 C45 64 55 64 62 59"/>';}
if(t==='K'){head='<path class="main" d="M45 10 H55 V25 H70 Q74 25 74 30 Q74 35 70 35 H55 V49 H45 V35 H30 Q26 35 26 30 Q26 25 30 25 H45 Z"/>';body='<path class="main" d="M33 51 C36 38 64 38 67 51 L63 86 C55 96 45 96 37 86 Z"/><path class="deep" d="M27 90 C38 84 62 84 73 90 L68 103 C58 109 42 109 32 103 Z"/>';detail='<path class="groove" d="M41 60 C47 65 53 65 59 60"/>';}
return '<svg class="softPiecePro '+cls+'" viewBox="0 0 100 120"><ellipse class="sh" cx="50" cy="108" rx="32" ry="8"/>'+head+body+detail+'</svg>';}
function softClassic(piece){var c=piece[0],t=piece[1],cls=c==='w'?'white':'black',head='',body='',markY=70;if(t==='P'){head='<circle class="body" cx="50" cy="34" r="15"/><circle class="top" cx="45" cy="28" r="6"/>';body='<path class="body" d="M35 55 C38 45 62 45 65 55 L71 87 C60 96 40 96 29 87 Z"/>';}
if(t==='R'){head='<path class="body" d="M30 22 Q30 16 36 16 H64 Q70 16 70 22 V35 Q70 42 63 42 H37 Q30 42 30 35 Z"/><rect class="top" x="38" y="12" width="24" height="10" rx="4"/>';body='<path class="body" d="M32 42 H68 L65 87 C56 96 44 96 35 87 Z"/>';}
if(t==='N'){head='<path class="body" d="M30 80 C34 58 30 43 43 28 C52 18 66 19 75 27 C68 30 70 40 78 45 C67 45 63 52 67 61 C57 59 51 64 49 81 C44 88 36 88 30 80 Z"/><circle class="mark" cx="58" cy="38" r="3"/>';body='<path class="cut" d="M42 31 C50 25 60 24 67 27 C55 28 48 34 42 42 Z"/>';}
if(t==='B'){head='<path class="body" d="M50 15 C67 30 70 49 58 63 C67 69 69 79 64 87 C56 95 44 95 36 87 C31 79 33 69 42 63 C30 49 33 30 50 15 Z"/><path class="cut" d="M51 28 C57 39 56 51 49 61 C43 51 44 39 51 28 Z"/>';}
if(t==='Q'){head='<path class="body" d="M22 43 L30 18 L42 38 L50 12 L58 38 L70 18 L78 43 Q67 50 50 50 Q33 50 22 43 Z"/><circle class="top" cx="30" cy="18" r="4"/><circle class="top" cx="50" cy="12" r="4"/><circle class="top" cx="70" cy="18" r="4"/>';body='<path class="body" d="M35 49 H65 L62 87 C54 96 46 96 38 87 Z"/>';}
if(t==='K'){head='<path class="body" d="M45 10 H55 V25 H70 Q74 25 74 30 Q74 35 70 35 H55 V49 H45 V35 H30 Q26 35 26 30 Q26 25 30 25 H45 Z"/>';body='<path class="body" d="M33 50 C36 37 64 37 67 50 L63 87 C55 96 45 96 37 87 Z"/>';markY=73;}

function classic(piece){var U={wK:'♔',wQ:'♕',wR:'♖',wB:'♗',wN:'♘',wP:'♙',bK:'♚',bQ:'♛',bR:'♜',bB:'♝',bN:'♞',bP:'♟'};return '<span class="pclassic '+(piece[0]==='w'?'w':'bl')+'">'+U[piece]+'</span>';}
function renderSculpt(){var w=frame.contentWindow,d=frame.contentDocument;if(!w||!d||!w.b)return;var board=d.getElementById('board'),pack=d.getElementById('pieceStyle')?d.getElementById('pieceStyle').value:'softpro';if(!board)return;board.innerHTML='';var k=w.findKing(w.t,w.b),chk=k&&w.attacked(w.b,k.x,k.y,w.enemy(w.t));for(var dy=0;dy<8;dy++)for(var dx=0;dx<8;dx++){var x=w.flip?7-dx:dx,y=w.flip?7-dy:dy,p=w.b[y][x],sq=d.createElement('div'),m=(w.leg||[]).find(function(v){return v.to.x===x&&v.to.y===y});sq.className='sq '+(((x+y)%2)?'d':'l');if(w.sel&&w.sel.x===x&&w.sel.y===y)sq.classList.add('sel');if(m){sq.classList.add('hint');if(w.b[y][x]||m.ep)sq.classList.add('take')}if(w.last&&((w.last.from.x===x&&w.last.from.y===y)||(w.last.to.x===x&&w.last.to.y===y)))sq.classList.add('last');if(w.flashTo&&w.flashTo.x===x&&w.flashTo.y===y)sq.classList.add('flash');if(chk&&k&&k.x===x&&k.y===y)sq.classList.add('check');sq.onclick=(function(a,b){return function(){w.tap(a,b);setTimeout(renderSculpt,25)}})(x,y);if(p){sq.innerHTML=pack==='classic'?classic(p):(pack==='soft3d'?softClassic(p):(pack==='forge'&&w.pieceSvg?w.pieceSvg(p):svgPro(p)));}board.appendChild(sq);}}
function wireDebug(){var d=frame.contentDocument,w=frame.contentWindow;function pretty(v){return v==='w'?'White':v==='b'?'Black':v==='draw'?'Draw':String(v||'none')}function debug(){renderSculpt();var theme=d.getElementById('theme'),pack=d.getElementById('pieceStyle');report=['PURE CHESS DEBUG REPORT','Version: play v15.3 soft sculpt','Architecture: v13 stable core with v15.3 sculpted visual renderer','No CDN. No external files.','Rules: check/checkmate/stalemate/castling/en passant/promotion picker','Visual System: split','Board Skin: '+(theme?theme.selectedOptions[0].textContent:'n/a'),'Piece Pack: '+(pack?pack.selectedOptions[0].textContent:'n/a'),'Soft Sculpt: active','Piece letters: removed from Pro pack','Hardwood board: preserved','Winner labels: clean','Result: '+w.result,'Reason: '+w.reason,'Winner: '+pretty(w.winner),'Turn: '+pretty(w.t),'Current legal moves: '+w.allLegal(w.t).length,'White legal moves: '+w.allLegal('w').length,'Black legal moves: '+w.allLegal('b').length,'In check: '+w.isCheck(w.t),'URL: '+location.href,'Squares: '+d.querySelectorAll('.sq').length,'Mode: '+d.getElementById('mode').value,'Bot: '+d.getElementById('bot').value].join('\n');var out=d.getElementById('debugOut');if(out)out.textContent=report;var toast=d.getElementById('toast');if(toast){toast.textContent='v15.3 debug ran.';toast.classList.add('show');setTimeout(function(){toast.classList.remove('show')},1500)}return report;}var db=d.getElementById('debugBtn'),cp=d.getElementById('copyBtn'),fab=d.getElementById('fab');if(db)db.onclick=debug;if(cp)cp.onclick=function(){if(!report)debug();navigator.clipboard&&navigator.clipboard.writeText(report)};if(fab)fab.onclick=function(){d.getElementById('cmd').classList.toggle('open');renderSculpt()};w.v153Debug=debug;}
frame.addEventListener('load',function(){setTimeout(install,250);setTimeout(install,1000)});
})();
</script>
