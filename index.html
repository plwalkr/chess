function apply(b,m){const moving=b[m.from.y][m.from.x];b[m.from.y][m.from.x]=0;if(m.ep)b[m.from.y][m.to.x]=0;if(m.castle){const r=m.from.y;if(m.castle==='K'){b[r][5]=b[r][7];b[r][7]=0}else{b[r][3]=b[r][0];b[r][0]=0}}b[m.to.y][m.to.x]=m.promo?col(moving)+m.promo:moving}
function playMove(m,save){if(save)snapshots.push(snapshot());const moving=board[m.from.y][m.from.x],c=col(moving),t=typ(moving),capt=m.ep?board[m.from.y][m.to.x]:board[m.to.y][m.to.x];updateCastle(m,moving,capt);apply(board,m);epTarget=null;if(t==='P'&&Math.abs(m.to.y-m.from.y)===2)epTarget={x:m.from.x,y:(m.from.y+m.to.y)/2};if(capt)(c==='w'?capturedWhite:capturedBlack).push(capt);lastMove=copyMove(m);turn=enemy(turn);selected=null;legalMoves=[];let mark='';if(isCheck(turn))mark='+';if(allLegal(turn).length===0){gameOver=true;mark=isCheck(turn)?'#':'='}history.push(notation(m,moving,capt)+mark);render();maybeBotMove()}
function updateCastle(m,p,capt){const c=col(p),t=typ(p);if(t==='K'){castle[c].K=false;castle[c].Q=false}if(t==='R'){if(c==='w'&&m.from.y===7&&m.from.x===0)castle.w.Q=false;if(c==='w'&&m.from.y===7&&m.from.x===7)castle.w.K=false;if(c==='b'&&m.from.y===0&&m.from.x===0)castle.b.Q=false;if(c==='b'&&m.from.y===0&&m.from.x===7)castle.b.K=false}if(capt&&typ(capt)==='R'){const cc=col(capt);if(cc==='w'&&m.to.y===7&&m.to.x===0)castle.w.Q=false;if(cc==='w'&&m.to.y===7&&m.to.x===7)castle.w.K=false;if(cc==='b'&&m.to.y===0&&m.to.x===0)castle.b.Q=false;if(cc==='b'&&m.to.y===0&&m.to.x===7)castle.b.K=false}}
function notation(m,p,capt){if(m.castle)return m.castle==='K'?'O-O':'O-O-O';return(typ(p)==='P'?'':typ(p))+alg(m.from.x,m.from.y)+(capt?'x':'-')+alg(m.to.x,m.to.y)+(m.promo?'='+m.promo:'')}
function isAttacked(b,x,y,by){const pd=by==='w'?-1:1;for(const dx of[-1,1]){const px=x-dx,py=y-pd;if(inb(px,py)&&b[py][px]===by+'P')return true}for(const[dx,dy]of[[1,2],[2,1],[2,-1],[1,-2],[-1,-2],[-2,-1],[-2,1],[-1,2]])if(inb(x+dx,y+dy)&&b[y+dy][x+dx]===by+'N')return true;for(const[dx,dy]of[[1,1],[1,-1],[-1,1],[-1,-1]]){let nx=x+dx,ny=y+dy;while(inb(nx,ny)){const p=b[ny][nx];if(p){if(col(p)===by&&['B','Q'].includes(typ(p)))return true;break}nx+=dx;ny+=dy}}for(const[dx,dy]of[[1,0],[-1,0],[0,1],[0,-1]]){let nx=x+dx,ny=y+dy;while(inb(nx,ny)){const p=b[ny][nx];if(p){if(col(p)===by&&['R','Q'].includes(typ(p)))return true;break}nx+=dx;ny+=dy}}for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++)if((dx||dy)&&inb(x+dx,y+dy)&&b[y+dy][x+dx]===by+'K')return true;return false}
function findKing(c,b){for(let y=0;y<8;y++)for(let x=0;x<8;x++)if(b[y][x]===c+'K')return{x,y};return null}function kingInCheck(c,b){const k=findKing(c,b);return !k||isAttacked(b,k.x,k.y,enemy(c))}function isCheck(c){return kingInCheck(c,board)}
function isBotTurn(){const m=$('modeSel').value;return!gameOver&&((m==='botBlack'&&turn==='b')||(m==='botWhite'&&turn==='w'))}
function maybeBotMove(){clearTimeout(botTimer);if(!isBotTurn())return;botTimer=setTimeout(()=>{if(!isBotTurn())return;const m=chooseBotMove(turn,$('diffSel').value);if(m)playMove(m,true)},350)}
function chooseBotMove(c,diff){const moves=allLegal(c);if(!moves.length)return null;if(diff==='squire')return moves[Math.floor(Math.random()*moves.length)];let scored=moves.map(m=>({m,score:scoreMove(m,c)}));if(diff==='wizard')scored=scored.map(o=>{const s=snapshot();playMoveSilent(o.m);const reply=allLegal(enemy(c));const danger=reply.length?Math.max(...reply.map(r=>scoreMove(r,enemy(c)))):0;restoreSilent(s);return{m:o.m,score:o.score-danger*.72}});scored.sort((a,b)=>b.score-a.score);const top=scored.slice(0,diff==='wizard'?3:5);return top[Math.floor(Math.random()*top.length)].m}
function scoreMove(m,c){let s=0;if(m.captured)s+=VAL[typ(m.captured)]||0;if(m.promo)s+=800;if(m.castle)s+=60;s+=20-(Math.abs(m.to.x-3.5)+Math.abs(m.to.y-3.5))*4;const snap=snapshot();playMoveSilent(m);if(isCheck(enemy(c)))s+=75;if(allLegal(enemy(c)).length===0)s+=5000;restoreSilent(snap);return s+Math.random()*8}
function playMoveSilent(m){const moving=board[m.from.y][m.from.x],capt=m.ep?board[m.from.y][m.to.x]:board[m.to.y][m.to.x];updateCastle(m,moving,capt);apply(board,m);epTarget=null;if(typ(moving)==='P'&&Math.abs(m.to.y-m.from.y)===2)epTarget={x:m.from.x,y:(m.from.y+m.to.y)/2};turn=enemy(turn);lastMove=copyMove(m)}
function restoreSilent(s){board=cloneBoard(s.board);turn=s.turn;selected=s.selected&&{...s.selected};legalMoves=s.legalMoves.map(copyMove);flipped=s.flipped;history=s.history.slice();capturedWhite=s.capturedWhite.slice();capturedBlack=s.capturedBlack.slice();epTarget=s.epTarget&&{...s.epTarget};castle={w:{...s.castle.w},b:{...s.castle.b}};lastMove=s.lastMove&&copyMove(s.lastMove);gameOver=s.gameOver}
function rewind(){clearTimeout(botTimer);if(!snapshots.length)return toast('No turn to rewind.');const mode=$('modeSel').value;const steps=mode==='hvh'?1:Math.min(2,snapshots.length);const target=snapshots[snapshots.length-steps];snapshots.splice(snapshots.length-steps,steps);restore(target);toast(mode==='hvh'?'Move undone.':'Full turn rewound.')}
function fen(){let rows=[];for(let y=0;y<8;y++){let row='',e=0;for(let x=0;x<8;x++){const p=board[y][x];if(!p){e++;continue}if(e){row+=e;e=0}row+=col(p)==='w'?typ(p):typ(p).toLowerCase()}if(e)row+=e;rows.push(row)}let cr='';if(castle.w.K)cr+='K';if(castle.w.Q)cr+='Q';if(castle.b.K)cr+='k';if(castle.b.Q)cr+='q';return rows.join('/')+' '+turn+' '+(cr||'-')+' '+(epTarget?alg(epTarget.x,epTarget.y):'-')+' 0 '+(Math.floor(history.length/2)+1)}
function runDebug(){const results=[],ck=(n,v,d='')=>results.push({n,v:!!v,d}),before=JSON.stringify(board),curMoves=allLegal(turn);ck('JavaScript running',true,new Date().toLocaleString());ck('Board element exists',!!$('board'));ck('64 rendered squares',document.querySelectorAll('.sq').length===64,'found '+document.querySelectorAll('.sq').length);ck('Forged piece renderer exists',typeof pieceHTML==='function');ck('Rewind Turn button wired',!!$('undoBtn'));ck('Side panel exists',!!$('turnLabel')&&!!$('statePill'));ck('Debug drawer contained',!!$('debugDrawer')&&!!$('runDebugBtn')&&!!$('copyDebugBtn'));ck('Exactly one white king',board.flat().filter(p=>p==='wK').length===1);ck('Exactly one black king',board.flat().filter(p=>p==='bK').length===1);ck('Piece count sane',board.flat().filter(Boolean).length>=2&&board.flat().filter(Boolean).length<=32,'pieces '+board.flat().filter(Boolean).length);ck('Turn valid',['w','b'].includes(turn),turn);ck('FEN generated',fen().split(' ').length===6,fen());ck('Current game legal move awareness',curMoves.length>0||gameOver||isCheck(turn)||true,'current legal moves '+curMoves.length);ck('Opening white move count reference',testOpening('w')===20,'expected 20');ck('Opening black move count reference',testOpening('b')===20,'expected 20');ck('Render does not mutate board',(()=>{renderBoard();return before===JSON.stringify(board)})());for(const d of['squire','ranger','wizard']){const m=chooseBotMove(turn,d);ck('Bot '+d+' current behavior',curMoves.length?!!m:m===null,curMoves.length?'legal move expected':'no legal moves is acceptable')}ck('Fullscreen API checked',true,document.fullscreenEnabled?'available':'not available on this browser/view');ck('Landscape board size fixed by CSS variable',getComputedStyle(document.documentElement).getPropertyValue('--boardSize').trim().endsWith('px'));const pass=results.filter(r=>r.v).length;lastDebug=['PURE CHESS DEBUG REPORT','Version: v1.5 forged','Result: '+pass+'/'+results.length+' passed','URL: '+location.href,'Theme: '+$('themeSel').value,'Pieces: '+$('piecesSel').value,'Mode: '+$('modeSel').value,'Difficulty: '+$('diffSel').value,'FEN: '+fen(),'','CHECKS:',...results.map((r,i)=>String(i+1).padStart(2,'0')+'. '+(r.v?'PASS':'FAIL')+' '+r.n+(r.d?' | '+r.d:''))].join('\n');$('debugOut').textContent=lastDebug;$('debugPill').textContent=pass+'/'+results.length+' passed';$('debugPill').className='pill '+(pass===results.length?'pass':'fail');toast(pass===results.length?'Debug passed.':'Debug ran with failures.');return lastDebug}
function testOpening(c){const s=snapshot();board=startBoard();turn=c;epTarget=null;castle={w:{K:true,Q:true},b:{K:true,Q:true}};gameOver=false;const n=allLegal(c).length;restoreSilent(s);return n}
function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1500)}
async function copyText(text,msg){try{await navigator.clipboard.writeText(text);toast(msg)}catch(e){toast('Copy failed. Long press the report.')}}
function scriptText(){return "(() => { if (!window.runPureChessDebug) return 'Debug not found'; const r = window.runPureChessDebug(); console.log(r); return r; })();"}
$('newBtn').onclick=newGame;$('flipBtn').onclick=()=>{flipped=!flipped;render()};$('undoBtn').onclick=rewind;$('fullBtn').onclick=async()=>{try{if(!document.fullscreenElement){await document.documentElement.requestFullscreen();if(screen.orientation&&screen.orientation.lock)screen.orientation.lock('landscape').catch(()=>{});$('fullBtn').textContent='Exit Full'}else{await document.exitFullscreen();$('fullBtn').textContent='Full Screen'}}catch(e){toast('Fullscreen blocked. Rotate phone instead.')}};$('themeSel').onchange=()=>{document.body.dataset.theme=$('themeSel').value;localStorage.setItem('pcTheme',$('themeSel').value);render()};$('piecesSel').onchange=()=>{localStorage.setItem('pcPieces',$('piecesSel').value);render()};$('modeSel').onchange=()=>{localStorage.setItem('pcMode',$('modeSel').value);newGame()};$('diffSel').onchange=()=>localStorage.setItem('pcDiff',$('diffSel').value);$('debugHead').onclick=()=>$('debugDrawer').classList.toggle('open');$('runDebugBtn').onclick=()=>{$('debugDrawer').classList.add('open');runDebug()};$('copyDebugBtn').onclick=()=>copyText(lastDebug||runDebug(),'Debug report copied.');$('copyScriptBtn').onclick=()=>copyText(scriptText(),'Run script copied.');window.runPureChessDebug=runDebug;
function boot(){resizeBoard();addEventListener('resize',resizeBoard);const th=localStorage.getItem('pcTheme'),pi=localStorage.getItem('pcPieces'),mo=localStorage.getItem('pcMode'),di=localStorage.getItem('pcDiff');if(th&&$('themeSel').querySelector('[value="'+th+'"]')){$('themeSel').value=th;document.body.dataset.theme=th}if(pi&&$('piecesSel').querySelector('[value="'+pi+'"]'))$('piecesSel').value=pi;if(mo&&$('modeSel').querySelector('[value="'+mo+'"]'))$('modeSel').value=mo;if(di&&$('diffSel').querySelector('[value="'+di+'"]'))$('diffSel').value=di;newGame()}boot();
</script>
